<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixx Admin Panel - Login</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
    <div class="admin-container">
        <div class="login-container">
            <div class="logo">
                <div class="logo-box">
                    <span class="logo-text">mixx</span>
                    <div class="logo-badge">TZ</div>
                </div>
            </div>

            <h1>⚙️ Mixx Admin Panel</h1>
            <p>Ingiza Neno Siri ili kuingia</p>

            <form id="loginForm" class="login-form">
                <input 
                    type="password" 
                    id="passwordInput" 
                    class="password-input" 
                    placeholder="Neno Siri" 
                    required
                >
                <button type="submit" class="login-btn">Ingia</button>
            </form>

            <div id="errorMessage" class="error-message"></div>

            <div class="back-link">
                <a href="index.html">← Kurudi</a>
            </div>
        </div>
    </div>

    <script src="admin-login-script.js"></script>
</body>
</html>
