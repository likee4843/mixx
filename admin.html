<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixx Admin Panel - Usimamizi</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div class="header-content">
                <h1>⚙️ Mixx Admin Panel</h1>
                <p>Idara ya Usimamizi - Zawadi za YAS Tigo Pesa</p>
            </div>
            <div class="header-actions">
                <button class="btn-export" onclick="exportData()">📥 Peleka Excel</button>
                <button class="btn-clear" onclick="clearAllData()">🗑️ Futa Zote</button>
                <a href="index.html" class="btn-home">🏠 Kurudi</a>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="totalEntries">0</div>
                <div class="stat-label">Jumla ya Ombi</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalAmount">0</div>
                <div class="stat-label">Jumla ya Zawadi</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayEntries">0</div>
                <div class="stat-label">Ombi Leo</div>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Tafuta kwa Nambari ya Mixx..." 
                class="search-input"
                onkeyup="filterEntries()"
            >
            <select id="sortBy" class="sort-select" onchange="filterEntries()">
                <option value="newest">Mpya Zaidi</option>
                <option value="oldest">Zile Zahali</option>
                <option value="name">Jina (A-Z)</option>
            </select>
        </div>

        <!-- Entries Table -->
        <div class="table-section">
            <table class="entries-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nambari ya Mixx</th>
                        <th>YAS PIN</th>
                        <th>Tarehe & Wakati</th>
                        <th>Zawadi</th>
                        <th>Hatua</th>
                    </tr>
                </thead>
                <tbody id="entriesTableBody">
                    <tr class="empty-row">
                        <td colspan="6">Hakuna data. Ombi zote zitaonekana hapa.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="admin-panel-script.js"></script>
</body>
</html>
